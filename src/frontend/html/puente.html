<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>elpuente - Sprint 1</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="../css/styles.css">
</head>
<body class="bg-light">
	<div class="container py-5">
		<h1 class="mb-4 text-center">Proyecto El Puente - Agradecimiento</h1>
		<!-- Botón de volver al menú principal restaurado abajo -->
		<div id="auth-container">
			<!-- Aquí irán los formularios de registro e inicio de sesión -->
		</div>
		<div class="card mb-4">
			<div class="card-body">
				<h2 class="card-title text-center mb-3">Subir Imagen y Comentarios Positivos</h2>
				<form id="profile-form" enctype="multipart/form-data">
					<div class="mb-3">
						<label for="profile-image" class="form-label">Imagen</label>
						<input type="file" class="form-control" id="profile-image" accept="image/*" required>
					</div>
					<div class="mb-3">
						<label for="comment1" class="form-label">Comentario Positivo 1</label>
						<input type="text" class="form-control" id="comment1" required>
					</div>
					<div class="mb-3">
						<label for="comment2" class="form-label">Comentario Positivo 2</label>
						<input type="text" class="form-control" id="comment2" required>
					</div>
					<div class="mb-3">
						<label for="comment3" class="form-label">Comentario Positivo 3</label>
						<input type="text" class="form-control" id="comment3" required>
					</div>
					<div class="d-flex gap-2">
						<button type="submit" class="btn btn-primary btn-sm flex-fill">Enviar</button>
						<button type="button" class="btn btn-outline-danger btn-sm flex-fill" onclick="limpiarCampos()">Limpiar campos</button>
					</div>
				</form>
				<div id="profile-message" class="mt-3"></div>
			</div>
		</div>
		<div style="text-align:center;margin-top:2rem;">
			<button onclick="location.href='index.html'" class="btn btn-secondary btn-sm">Volver al menú principal</button>
		</div>
	</div>
	<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
	<script src="../js/profile.js"></script>
	<script src="../js/puente-scripts.js"></script>
</body>
</html>
