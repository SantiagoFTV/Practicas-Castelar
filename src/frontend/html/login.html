<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión</title>
  <style>
    body {
      background: #f4f6fb;
      font-family: Arial, sans-serif;
    }
    .login-container {
      max-width: 350px;
      margin: 60px auto;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 2px 8px #0001;
      padding: 2rem;
    }
    .login-container h2 {
      text-align: center;
      margin-bottom: 1.5rem;
      color: #2d3a4b;
    }
    .form-group {
      margin-bottom: 1.2rem;
    }
    label {
      display: block;
      margin-bottom: 0.4rem;
      color: #2d3a4b;
    }
    input[type="email"], input[type="password"] {
      width: 100%;
      padding: 0.7rem;
      border: 1px solid #cfd8dc;
      border-radius: 5px;
    }
    button {
      width: 100%;
      padding: 0.8rem;
      background: #4f8cff;
      color: #fff;
      border: none;
      border-radius: 5px;
      font-size: 1rem;
      cursor: pointer;
    }
    button:hover {
      background: #3466c2;
    }
    .error {
      color: #d32f2f;
      text-align: center;
      margin-bottom: 1rem;
    }
    @media (max-width: 600px) {
      .login-container {
        max-width: 98vw;
        margin: 20px auto;
        padding: 1rem;
        box-shadow: none;
        border-radius: 0;
      }
      h2 {
        font-size: 1.3rem;
      }
      button {
        font-size: 0.95rem;
        padding: 0.7rem;
      }
      .form-group input {
        font-size: 1rem;
        padding: 0.6rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Iniciar Sesión</h2>
    <form id="login-form">
      <div class="form-group">
        <label for="login-email">Correo electrónico</label>
        <input type="email" id="login-email" name="email" required>
      </div>
      <div class="form-group">
        <label for="login-password">Contraseña</label>
        <input type="password" id="login-password" name="password" required>
      </div>
      <div id="login-error" class="error" style="display:none;"></div>
      <button type="submit">Entrar</button>
    </form>
    <div style="text-align:center;margin-top:1rem;">
      <a href="register.html">¿No tienes cuenta? Regístrate</a> |
      <a href="forgot.html">Olvidé mi contraseña</a>
    </div>
  </div>
  <script src="../js/login.js"></script>
</body>
</html>
